# Self-contained inline copy of the Open-Systems-Pharmacology reusable
# R-CMD-check-build workflow and its setup-r-env composite action, flattened so
# this file depends on no Open-Systems-Pharmacology/Workflows content, only on
# public r-lib and actions/* steps.
#
# The distinctive OSP step is installing the .NET 8 runtime on every runner via
# actions/setup-dotnet, which the plain r-lib workflow does not do. That is why
# the rSharp/.NET tests pass on macOS here. The OSP dependencies themselves are
# resolved from the R-universe via `extra-repositories` on setup-r (there is no
# `Remotes:` field in DESCRIPTION).

on:
  push:
    branches: [main]
  pull_request:

name: pull-request.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: OSP-inline ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: macos-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v7

      # --- inlined from setup-r-env composite action ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
          extra-repositories: https://open-systems-pharmacology.r-universe.dev

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      # --- end setup-r-env ---

      - name: Check R package
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: 'c("--no-manual")'
          build_args: 'c("--no-manual")'
          error-on: 'c("error")'
